<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Carregando... | ClassHub</title>
    <style>
        body {
            margin: 0;
            background-color: #222222; /* Seu fundo */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* O Círculo de Carregamento Azul */
        .loader {
            border: 12px solid #333;
            border-radius: 50%;
            border-top: 12px solid #007bff; /* Seu azul */
            width: 80px;
            height: 80px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-cancel {
            background-color: #333;
            border: 1px solid #444;
            color: white;
            padding: 10px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .button-cancel:hover {
            background-color: #ff4444; /* Vermelho ao passar o mouse para cancelar */
        }
    </style>
</head>
<body>

    <div class="loader"></div>
    <h1 style="font-size: 24px;">Carregando conteúdo...</h1>
    <p style="color: #888; margin-bottom: 20px;">Isso pode levar alguns segundos.</p>
    
    <a href="app.html" class="button-cancel">Cancelar</a>

</body>
</html>
