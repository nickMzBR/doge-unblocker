<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ClassHub | Pesquisa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2991/2991165.png">
    
    <style>
        /* Fundo #222 e Estilo Minimalista */
        body, html {
            height: 100%;
            margin: 0;
            background-color: #222222;
            color: white;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 650px;
            text-align: center;
            margin-top: -50px; /* Sobe um pouco a barra para o centro visual */
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: -0.5px;
        }

        .logo i {
            color: #007bff; /* Seu Azul */
        }

        /* Barra de Busca Pro */
        .search-form {
            width: 100%;
        }

        .form__input {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: white;
            font-size: 18px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .form__input:focus {
            border-color: #007bff;
            background: #1e1e1e;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
        }

        .footer-info {
            position: absolute;
            bottom: 30px;
            color: #555;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <i class="fa fa-shield"></i> ClassHub
    </div>

    <form id="searchbar" action="/go.html" method="POST" class="search-form">
        <input type="text" name="url" class="form__input" placeholder="Pesquisar ou digitar URL..." autocomplete="off">
    </form>
</div>

<div class="footer-info">
    Conexão Acadêmica Segura
</div>

<script src="uv/uv.bundle.js"></script>
<script src="uv/uv.config.js"></script>
<script src="index.js"></script> 

</body>
</html>
